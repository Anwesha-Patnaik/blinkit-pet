<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>blinkit pet feature</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <div class="ios-container">
        <div class="notch"></div>
        
        <!-- Splash Screen -->
        <div id="splash-screen" class="screen">
          <img src="/Blinkit Splash Screen (1).svg" alt="Blinkit Splash" class="splash-img" />
        </div>

        <!-- Homepage -->
        <div id="homepage" class="screen hidden">
          <!-- The homepage bg will serve as the base -->
          <img src="/without banner.jpg" alt="Homepage" class="homepage-bg" />
          
          <div class="banner-container">
            <img src="/banner homepage.png?v=2" alt="Banner" class="banner-img" />
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
